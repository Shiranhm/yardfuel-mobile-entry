<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>YardFuel</title><style>
:root{--g:#19724d;--m:#6b7772;--l:#dce3df;--ink:#14221d}*{box-sizing:border-box}body{margin:0;background:#f2f0e9;color:var(--ink);font-family:Inter,system-ui,sans-serif}.shell{min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:min(100%,480px);background:#fff;padding:24px;border-radius:20px;box-shadow:0 15px 55px #1726201c}.brand{display:flex;gap:10px;align-items:center}.mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--g);color:#fff;font-weight:900}.brand small,.muted{display:block;color:var(--m);font-size:12px}.top{display:flex;justify-content:space-between;align-items:center;padding-bottom:22px;border-bottom:1px solid var(--l)}.intro{padding:24px 0 20px}.intro b{color:var(--g);font-size:11px;text-transform:uppercase;letter-spacing:.12em}.intro h1{margin:5px 0;font-size:30px}form{display:grid;gap:17px}label{display:grid;gap:8px;font-size:14px;font-weight:750}input,select,button{font:inherit}input,select{height:56px;border:1px solid #cfd8d3;border-radius:12px;padding:0 15px;background:#fff;font-weight:650}.previous{display:flex;justify-content:space-between;background:#f4f7f5;border-radius:10px;padding:13px 15px}.previous span{color:var(--m);font-size:12px}.submit{height:58px;border:0;border-radius:12px;background:var(--g);color:#fff;font-weight:850}.notice{padding:10px;border-radius:9px;background:#f5f2e4;color:#655c31;font-size:12px}.hidden{display:none!important}.status{color:var(--g);font-weight:800;font-size:13px}.actions{display:flex;gap:10px;margin-top:12px}.actions button{flex:1;min-height:44px;border:1px solid var(--l);border-radius:10px;background:#fff;font-weight:750}.entry{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #eee;font-size:13px}.entry small{display:block;color:var(--m);font-size:10px}.right{text-align:right}@media(max-width:520px){.shell{padding:0}.card{min-height:100vh;border-radius:0;box-shadow:none}}
</style></head><body>
<section id="login" class="shell"><form id="loginForm" class="card"><div class="brand"><span class="mark">YF</span><span><strong>YardFuel</strong><small>Employee access</small></span></div><div class="intro"><b>Secure sign in</b><h1>Welcome</h1><span class="muted">Enter your employee ID and PIN.</span></div><label>Employee ID<input id="userId" required autocomplete="username"></label><label>PIN<input id="pin" type="password" inputmode="numeric" required autocomplete="current-password"></label><p id="loginMsg" class="notice hidden"></p><button class="submit">Sign in →</button></form></section>
<main id="app" class="shell hidden"><section class="card"><header class="top"><div class="brand"><span class="mark">YF</span><span><strong>YardFuel</strong><small id="employee"></small></span></div><div><div id="online" class="status">● Online</div><small id="pending" class="muted">0 pending</small></div></header><div class="intro"><b>Fuel entry</b><h1>Record a fill-up</h1><span class="muted">Select truck → odometer → litres → submit</span></div><form id="fuelForm"><label>1. Truck Number<select id="truck" required><option value="" disabled selected>Select truck</option></select></label><div class="previous"><span>Previous Odometer</span><strong id="previous">— km</strong></div><label>2. Current Odometer<input id="odo" type="number" inputmode="numeric" required disabled></label><label>3. Fuel Pumped in Litres<input id="litres" type="number" inputmode="decimal" step="0.01" required disabled></label><p id="msg" class="notice hidden"></p><button class="submit">Submit fuel entry →</button></form><div class="actions"><button id="recentBtn">Recent Entries</button><button id="syncBtn" class="hidden">Sync Now</button></div><section id="recent" class="hidden"><h3>Recent entries</h3><div id="list"></div></section></section></main>
<script>
const API='https://script.google.com/macros/s/AKfycbzMH-wH7C3hwANdKLo6zxYTR8WD2pBTirWwX5tXrNDmMruuhPYTN-TeSWdAj0516KR0/exec',Q='yardfuel-queue',D='yardfuel-device';let token='',user=null,trucks=[],queue=JSON.parse(localStorage.getItem(Q)||'[]');const $=x=>document.getElementById(x);let device=localStorage.getItem(D);if(!device){device=crypto.randomUUID();localStorage.setItem(D,device)}async function api(data){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});return r.json()}function show(id,text){$(id).textContent=text;$(id).classList.remove('hidden')}function status(){$('online').textContent=navigator.onLine?'● Online':'● Offline';$('pending').textContent=queue.length+' pending';$('syncBtn').classList.toggle('hidden',!queue.length)}$('loginForm').onsubmit=async e=>{e.preventDefault();try{const r=await api({action:'login',userId:$('userId').value,pin:$('pin').value,deviceId:device});if(!r.ok)throw Error(r.error);token=r.token;user=r.user;trucks=r.trucks||[];$('employee').textContent=user.name;$('login').classList.add('hidden');$('app').classList.remove('hidden');const s=$('truck');trucks.forEach(t=>s.add(new Option(`${t.number} · ${t.description}`,t.number)));status();sync()}catch(x){show('loginMsg',x.message)}};$('truck').onchange=()=>{const t=trucks.find(x=>x.number===$('truck').value);$('previous').textContent=t.previousOdometer.toLocaleString()+' km';$('odo').min=t.previousOdometer+1;$('litres').max=t.tankCapacity;$('odo').disabled=$('litres').disabled=false};$('fuelForm').onsubmit=async e=>{e.preventDefault();const payload={action:'submit',token,transactionId:crypto.randomUUID(),truckNumber:$('truck').value,odometer:+$('odo').value,litres:+$('litres').value,deviceId:device,deviceDateTime:new Date().toISOString(),entryMode:navigator.onLine?'Online':'Offline'};if(!navigator.onLine){queue.push(payload);localStorage.setItem(Q,JSON.stringify(queue));show('msg','Saved offline and queued for synchronisation.');status();return}try{const r=await api(payload);if(!r.ok)throw Error(r.error);show('msg',`Saved · ${r.transaction.Reference}`);$('odo').value=$('litres').value=''}catch(x){queue.push(payload);localStorage.setItem(Q,JSON.stringify(queue));show('msg','Connection failed. Entry queued safely.');status()}};async function sync(){if(!navigator.onLine||!token)return;for(let i=0;i<queue.length;){queue[i].token=token;try{const r=await api(queue[i]);if(!r.ok)throw Error(r.error);queue.splice(i,1)}catch(_){break}}localStorage.setItem(Q,JSON.stringify(queue));status()}$('syncBtn').onclick=sync;$('recentBtn').onclick=()=>{$('recent').classList.toggle('hidden');$('list').innerHTML=queue.map(x=>`<div class="entry"><b>${x.truckNumber}</b><span class="right">${x.litres} L<small>${x.odometer} km · Pending</small></span></div>`).join('')||'<p class="muted">No pending entries.</p>'};addEventListener('online',()=>{status();sync()});addEventListener('offline',status);status();
</script></body></html>
