<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>YardFuel Mobile Entry</title><style>
:root{--g:#19724d;--gd:#12573b;--m:#6b7772;--l:#dce3df;--mint:#e9f4ee;--ink:#14221d}*{box-sizing:border-box}body{margin:0;background:#f2f0e9;color:var(--ink);font-family:Inter,system-ui,sans-serif}.shell{min-height:100vh;display:grid;place-items:center}.card{width:min(100%,500px);min-height:100vh;background:#fff;padding:24px 22px 30px}.top{display:flex;justify-content:space-between;align-items:center;padding-bottom:24px;border-bottom:1px solid var(--l)}.brand{display:flex;gap:10px;align-items:center}.mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:var(--g);color:#fff;font-weight:900}.brand strong,.brand small{display:block}.brand small,.pending{color:var(--m);font-size:11px}.state{text-align:right;font-size:13px;font-weight:800}.state i{display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-right:6px}.online{color:var(--g)}.offline{color:#b34b38}.intro{padding:25px 0 22px}.intro b{color:var(--g);font-size:11px;letter-spacing:.13em;text-transform:uppercase}.intro h1{margin:5px 0;font-size:31px}.intro span{color:var(--m);font-size:14px}form{display:grid;gap:18px}label{display:grid;gap:8px;font-weight:750;font-size:14px}.label{display:flex;align-items:center;gap:9px}.label b{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--mint);color:var(--g);font-size:12px}select,input{width:100%;height:58px;border:1px solid #cfd8d3;border-radius:12px;padding:0 16px;background:#fff;font:inherit;font-weight:650;color:var(--ink)}select:focus,input:focus{outline:3px solid #19724d20;border-color:var(--g)}input:disabled{background:#f6f7f6}.previous{display:flex;justify-content:space-between;align-items:center;background:#f4f7f5;border-radius:11px;padding:13px 15px;margin-top:-7px}.previous span{color:var(--m);font-size:12px}.unit{position:relative}.unit input{padding-right:48px}.unit em{position:absolute;right:16px;top:19px;color:var(--m);font-style:normal;font-weight:800}.notice{margin:0;padding:10px 12px;border-radius:9px;background:#f5f2e4;color:#655c31;font-size:12px}.submit{height:59px;border:0;border-radius:12px;background:var(--g);color:#fff;font-weight:850;font-size:15px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.actions button{min-height:46px;border-radius:11px;font-weight:750}.recent-btn{background:#fff;border:1px solid var(--l)}.sync{background:var(--mint);border:1px solid #cbe2d5;color:var(--gd)}.hidden{display:none}.recent{margin-top:18px;border-top:1px solid var(--l);padding-top:14px}.entry{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #edf0ee;font-size:13px}.entry small{display:block;color:var(--m);font-size:10px;margin-top:3px}.right{text-align:right}@media(min-width:540px){.shell{padding:32px}.card{min-height:auto;border-radius:22px;box-shadow:0 20px 70px #1726201f}}
</style></head><body><main class="shell"><section class="card"><header class="top"><div class="brand"><span class="mark">YF</span><span><strong>YardFuel</strong><small>Fleet control</small></span></div><div><div id="state" class="state online"><i></i>Online</div><div id="pending" class="pending">0 pending</div></div></header><div class="intro"><b>Fuel entry</b><h1>Record a fill-up</h1><span>Three quick steps. That’s it.</span></div><form id="form"><label><span class="label"><b>1</b>Truck Number</span><select id="truck" required><option value="" disabled selected>Select truck</option></select></label><div class="previous"><span>Previous Odometer</span><strong id="previous">— km</strong></div><label><span class="label"><b>2</b>Current Odometer</span><span class="unit"><input id="odo" type="number" inputmode="numeric" placeholder="Enter reading" required disabled><em>km</em></span></label><label><span class="label"><b>3</b>Fuel Pumped</span><span class="unit"><input id="fuel" type="number" inputmode="decimal" step="0.01" placeholder="Enter litres" required disabled><em>L</em></span></label><p id="notice" class="notice hidden"></p><button class="submit">Submit fuel entry →</button></form><div class="actions"><button id="recentBtn" class="recent-btn">Recent Entries</button><button id="sync" class="sync hidden">↻ Sync Now</button></div><section id="recent" class="recent hidden"><strong>Recent entries</strong><div id="list"></div></section></section></main><script>
const trucks=[{n:'T-104',d:'Toyota Dyna 150',p:128450,c:80},{n:'T-118',d:'Toyota Hino 300',p:94320,c:100},{n:'T-127',d:'Toyota Hilux 2.4 GD-6',p:76410,c:80}],key='yardfuel-entries';let entries=JSON.parse(localStorage.getItem(key)||'[]');const $=id=>document.getElementById(id),truck=$('truck'),odo=$('odo'),fuel=$('fuel');trucks.forEach(t=>truck.add(new Option(`${t.n} · ${t.d}`,t.n)));function selected(){return trucks.find(t=>t.n===truck.value)}function save(){localStorage.setItem(key,JSON.stringify(entries));render()}function render(){const online=navigator.onLine;$('state').className='state '+(online?'online':'offline');$('state').innerHTML='<i></i>'+(online?'Online':'Offline');const pending=entries.filter(e=>!e.synced).length;$('pending').textContent=pending+' pending';$('sync').classList.toggle('hidden',!pending);$('sync').textContent='↻ Sync Now ('+pending+')';$('list').innerHTML=entries.slice(0,5).map(e=>`<div class="entry"><span><b>${e.truck}</b><small>${new Date(e.time).toLocaleString()}</small></span><span class="right"><b>${e.litres.toFixed(2)} L</b><small>${e.odo.toLocaleString()} km · ${e.synced?'Synced':'Pending'}</small></span></div>`).join('')||'<p>No entries on this device yet.</p>'}truck.onchange=()=>{const t=selected();$('previous').textContent=t.p.toLocaleString()+' km';odo.disabled=fuel.disabled=false;odo.min=t.p+1;fuel.max=t.c};$('form').onsubmit=e=>{e.preventDefault();const t=selected(),o=+odo.value,f=+fuel.value,n=$('notice');n.classList.remove('hidden');if(o<=t.p){n.textContent='Current odometer must be higher than the previous reading.';return}if(f<=0||f>t.c){n.textContent=`Fuel must be between 0 and ${t.c} litres.`;return}entries.unshift({id:crypto.randomUUID(),truck:t.n,odo:o,litres:f,time:new Date().toISOString(),synced:navigator.onLine});save();odo.value=fuel.value='';n.textContent=navigator.onLine?'Entry saved successfully.':'Entry saved offline and queued for synchronisation.'};$('recentBtn').onclick=()=>{$('recent').classList.toggle('hidden');render()};$('sync').onclick=()=>{if(!navigator.onLine)return;entries=entries.map(e=>({...e,synced:true}));save()};addEventListener('online',render);addEventListener('offline',render);render();
</script></body></html>
