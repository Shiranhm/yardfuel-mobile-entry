<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>YardFuel Admin</title><style>body{margin:0;background:#f3f5f4;color:#14221d;font:14px system-ui}.wrap{max-width:1100px;margin:auto;padding:24px}h1{margin:0}.bar,.panel{background:#fff;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 8px 30px #0000000b}.bar{display:flex;justify-content:space-between;align-items:center}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}form{display:grid;gap:10px}input,button{height:43px;border:1px solid #d5ddd8;border-radius:9px;padding:0 12px;font:inherit}button{background:#19724d;color:#fff;border:0;font-weight:800}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid #eee;font-size:12px}.hidden{display:none}.msg{color:#8a5b00}</style></head><body><div class="wrap"><div class="bar"><div><h1>YardFuel Admin</h1><small>Employees, trucks and transactions</small></div><a href="index.html">Mobile app</a></div><section id="login" class="panel"><form id="loginForm"><h2>Administrator sign in</h2><input id="uid" placeholder="Admin user ID" required><input id="pin" type="password" placeholder="PIN" required><button>Sign in</button><p id="msg" class="msg"></p></form></section><main id="dash" class="hidden"><div class="grid"><section class="panel"><form id="employeeForm"><h2>Add / update employee</h2><input id="eId" placeholder="Employee ID" required><input id="eName" placeholder="Employee name" required><input id="ePin" type="password" placeholder="New PIN" required><button>Save employee</button></form></section><section class="panel"><form id="truckForm"><h2>Add / update truck</h2><input id="tNo" placeholder="Truck number" required><input id="tDesc" placeholder="Description" required><input id="tDriver" placeholder="Assigned driver"><input id="tOdo" type="number" placeholder="Previous odometer" required><input id="tStd" type="number" step=".01" placeholder="Standard L/100km" required><input id="tTank" type="number" placeholder="Tank capacity litres" required><input id="tWarn" type="number" value="10" placeholder="Warning tolerance %"><input id="tCrit" type="number" value="20" placeholder="Critical tolerance %"><button>Save truck</button></form></section></div><section class="panel"><h2>Transactions</h2><div style="overflow:auto"><table><thead><tr><th>Reference</th><th>Employee</th><th>Truck</th><th>Odometer</th><th>Litres</th><th>Consumption</th><th>Status</th><th>Server time</th></tr></thead><tbody id="rows"></tbody></table></div></section></main></div><script>const API='https://script.google.com/macros/s/AKfycbzMH-wH7C3hwANdKLo6zxYTR8WD2pBTirWwX5tXrNDmMruuhPYTN-TeSWdAj0516KR0/exec';let token='';async function api(x){return(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(x)})).json()}async function load(){const r=await api({action:'dashboard',token});if(!r.ok)throw Error(r.error);document.getElementById('rows').innerHTML=r.transactions.map(x=>`<tr><td>${x.Reference||''}</td><td>${x['Employee Name']||''}</td><td>${x['Truck Number']||''}</td><td>${x['Current Odometer']||''}</td><td>${x['Fuel Litres']||''}</td><td>${x['Actual L/100km']||''}</td><td>${x.Status||''}</td><td>${x['Server Date Time']||''}</td></tr>`).join('')}loginForm.onsubmit=async e=>{e.preventDefault();try{const r=await api({action:'login',userId:uid.value,pin:pin.value,deviceId:'ADMIN-DESKTOP'});if(!r.ok||!r.user.admin)throw Error(r.error||'Administrator required');token=r.token;login.classList.add('hidden');dash.classList.remove('hidden');load()}catch(x){msg.textContent=x.message}};employeeForm.onsubmit=async e=>{e.preventDefault();const r=await api({action:'saveEmployee',token,userId:eId.value,name:eName.value,pin:ePin.value,active:true});alert(r.ok?'Employee saved':r.error)};truckForm.onsubmit=async e=>{e.preventDefault();const r=await api({action:'saveTruck',token,number:tNo.value,description:tDesc.value,driver:tDriver.value,previousOdometer:+tOdo.value,standard:+tStd.value,tankCapacity:+tTank.value,warningTolerance:+tWarn.value,criticalTolerance:+tCrit.value,active:true});alert(r.ok?'Truck saved':r.error);if(r.ok)load()};</script></body></html>
