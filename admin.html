<section id="login" class="panel"><form id="loginForm"><h2>Administrator sign in</h2><input id="uid" placeholder="Admin user ID" required><input id="pin" type="password" placeholder="PIN" required><button>Sign in</button><p id="msg" class="msg"></p></form></section>

<section class="panel"><div class="report-head"><div><h2 id="reportTitle">Report</h2><p id="reportNote" class="note"></p></div><div class="nav no-print"><button id="csvBtn">Export CSV</button><button id="printBtn" class="secondary">Print / PDF</button></div></div><div class="table-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div><p id="rowCount" class="note"></p></section>
<section class="grid settings no-print"><section class="panel"><form id="employeeForm"><h2>Add / update employee</h2><input id="eId" placeholder="Employee ID" required><input id="eName" placeholder="Employee name" required><input id="ePin" type="password" placeholder="New PIN" required><button>Save employee</button></form></section><section class="panel"><form id="truckForm"><h2>Add / update truck</h2><input id="tNo" placeholder="Truck number" required><input id="tDesc" placeholder="Description" required><input id="tDriver" placeholder="Assigned driver"><input id="tOdo" type="number" placeholder="Previous odometer" required><input id="tStd" type="number" step=".01" placeholder="Standard L/100km" required><input id="tTank" type="number" placeholder="Tank capacity litres" required><input id="tWarn" type="number" value="10" placeholder="Warning tolerance %"><input id="tCrit" type="number" value="20" placeholder="Critical tolerance %"><button>Save truck</button></form></section></section></main></div>

<script src="config.js"></script><script>
const API=window.YARDFUEL_CONFIG?.apiUrl||'';let token='',data={transactions:[],trucks:[],employees:[],audit:[],investigations:[]},viewRows=[],sortKey='',sortDir=1;
const $=id=>document.getElementById(id),num=v=>Number(v)||0,fmt=v=>v instanceof Date?v.toLocaleString():v??'',dateKey=v=>{const d=new Date(v);return isNaN(d)?String(v||'').slice(0,10):d.toISOString().slice(0,10)},round=n=>Math.round((n||0)*100)/100,esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(x){return(await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(x)})).json()}
function enrich(){const truckMap=Object.fromEntries(data.trucks.map(t=>[t.number,t])), day={},odos={},qty={};data.transactions.forEach(x=>{x._date=dateKey(x['Server Date Time']||x['Entry Date']);x._truck=truckMap[x['Truck Number']]||{};x._driver=x['Assigned Driver']||x._truck.driver||'Unassigned';x._km=num(x['Kilometres Travelled']);x._litres=num(x['Fuel Litres']);x._actual=num(x['Actual L/100km']);x._variation=num(x['Variation %']);const dk=x._date+'|'+x['Truck Number'];(day[dk]??=[]).push(x);const ok=x['Truck Number']+'|'+x['Current Odometer'];(odos[ok]??=[]).push(x);const qk=x['Truck Number']+'|'+x._litres.toFixed(2);(qty[qk]??=[]).push(x)});data.transactions.forEach(x=>{const reasons=[];const t=x._truck,dk=x._date+'|'+x['Truck Number'],ok=x['Truck Number']+'|'+x['Current Odometer'],qk=x['Truck Number']+'|'+x._litres.toFixed(2);if(x._variation>=num(t.criticalTolerance||20))reasons.push('Excessive fuel consumption');if(x._km>0&&x._km<50)reasons.push('Very low kilometres since the previous refill');if((day[dk]||[]).length>1)reasons.push('Multiple refills on the same day');if((odos[ok]||[]).length>1)reasons.push('Same odometer used more than once');if(num(x['Current Odometer'])<num(x['Previous Odometer']))reasons.push('Odometer lower than the previous reading');if(x._km===0)reasons.push('Zero kilometres travelled');if(x._litres>num(t.tankCapacity))reasons.push('Fuel quantity above truck tank capacity');if(x._litres>num(t.tankCapacity)*.9)reasons.push('Unusually large fuel quantity');if((qty[qk]||[]).length>=3)reasons.push('Repeated identical fuel quantities');const delay=(new Date(x['Upload Date Time'])-new Date(x['Device Date Time']))/36e5;if(String(x['Entry Mode']).toLowerCase()==='offline'&&delay>4)reasons.push('Offline entry uploaded much later');const edits=data.audit.filter(a=>String(a['Entity ID'])===String(x.Reference||x['Transaction ID'])&&/EDIT|DELETE|SOFT_DELETE/.test(a.Action));if(edits.length)reasons.push('Edited or deleted transaction');x._reasons=[...new Set(reasons)];x._risk=x._reasons.length>=4||x.Status==='Critical'?'Critical':x._reasons.length>=2||x.Status==='Warning'?'Warning':x._reasons.length?'Warning':'Normal';x._delay=round(delay>0?delay:0)});}
function filtered(){return data.transactions.filter(x=>(!fromDate.value||x._date>=fromDate.value)&&(!toDate.value||x._date<=toDate.value)&&(!truckFilter.value||x['Truck Number']===truckFilter.value)&&(!driverFilter.value||x._driver===driverFilter.value)&&(!statusFilter.value||x._risk===statusFilter.value||x.Status===statusFilter.value)&&(!enteredFilter.value||x['Employee Name']===enteredFilter.value)&&(!modeFilter.value||x['Entry Mode']===modeFilter.value)&&(!exceptionFilter.value||x._reasons.includes(exceptionFilter.value)))}
const txCols=['Date and time','Truck number','Assigned driver','Previous odometer','Current odometer','Kilometres travelled','Fuel litres pumped','Actual fuel consumption','Toyota standard consumption','Variation percentage','Exception reason','Risk status','Entered by','Transaction reference','Investigation'];
const txRow=x=>({'Date and time':fmt(x['Server Date Time']),'Truck number':x['Truck Number'],'Assigned driver':x._driver,'Previous odometer':x['Previous Odometer'],'Current odometer':x['Current Odometer'],'Kilometres travelled':x._km,'Fuel litres pumped':x._litres,'Actual fuel consumption':x._actual,'Toyota standard consumption':x['Toyota Standard L/100km'],'Variation percentage':x._variation,'Exception reason':x._reasons.join('; '),'Risk status':x._risk,'Entered by':x['Employee Name'],'Transaction reference':x.Reference,Investigation:'Investigate'});
function group(xs,keys){const m={};xs.forEach(x=>{const k=keys.map(z=>z(x)).join('|');(m[k]??=[]).push(x)});return Object.values(m)}function agg(g){const km=g.reduce((s,x)=>s+x._km,0),litres=g.reduce((s,x)=>s+x._litres,0),actual=km?litres/km*100:0,std=g.reduce((s,x)=>s+num(x['Toyota Standard L/100km']),0)/(g.length||1);return{km:round(km),litres:round(litres),actual:round(actual),std:round(std),variation:std?round((actual-std)/std*100):0,warn:g.filter(x=>x.Status==='Warning').length,crit:g.filter(x=>x.Status==='Critical').length,susp:g.filter(x=>x._reasons.length).length}}
function makeReport(name,xs){let cols=txCols,rows=[];const byDriver=group(xs,[x=>x._driver,x=>x['Truck Number']]),byTruck=group(xs,[x=>x['Truck Number'],x=>x._driver]);if(name==='suspicious')rows=xs.filter(x=>x._reasons.length).map(txRow);
else if(name==='driverPerformance'||name==='driverComparison'){cols=['Driver name','Truck number','Total fuel litres','Total kilometres travelled','Number of refills','Average actual consumption','Toyota standard consumption','Variation percentage','Warning count','Critical count','Multiple-refill count','Odometer-exception count','Suspicious transactions','Overall risk status'];rows=byDriver.map(g=>{const a=agg(g),risk=a.crit>1||a.susp>4?'Critical':a.crit||a.susp>2?'High':a.warn||a.susp?'Medium':'Low';return{'Driver name':g[0]._driver,'Truck number':g[0]['Truck Number'],'Total fuel litres':a.litres,'Total kilometres travelled':a.km,'Number of refills':g.length,'Average actual consumption':a.actual,'Toyota standard consumption':a.std,'Variation percentage':a.variation,'Warning count':a.warn,'Critical count':a.crit,'Multiple-refill count':g.filter(x=>x._reasons.includes('Multiple refills on the same day')).length,'Odometer-exception count':g.filter(x=>x._reasons.some(r=>/odometer|kilometres/i.test(r))).length,'Suspicious transactions':a.susp,'Overall risk status':risk}})}
else if(name==='toyota'){cols=['Truck number','Driver','Total kilometres','Total fuel litres','Toyota standard','Actual consumption','Difference','Variation percentage','Warning limit','Critical limit','Status'];rows=byTruck.map(g=>{const a=agg(g),t=g[0]._truck,status=!a.km?'Insufficient Data':a.km<0?'Odometer Error':a.variation>=num(t.criticalTolerance)?'Critical':a.variation>=num(t.warningTolerance)?'Warning':'Normal';return{'Truck number':g[0]['Truck Number'],Driver:g[0]._driver,'Total kilometres':a.km,'Total fuel litres':a.litres,'Toyota standard':a.std,'Actual consumption':a.actual,Difference:round(a.actual-a.std),'Variation percentage':a.variation,'Warning limit':t.warningTolerance,'Critical limit':t.criticalTolerance,Status:status}})}
else if(name==='multiple'){cols=['Date','Truck number','Driver','Number of refills','Refill times','Odometer readings','Litres for each refill','Total litres for the day','Kilometres between refills','Status'];rows=group(xs,[x=>x._date,x=>x['Truck Number']]).filter(g=>g.length>1).map(g=>({'Date':g[0]._date,'Truck number':g[0]['Truck Number'],Driver:g[0]._driver,'Number of refills':g.length,'Refill times':g.map(x=>x['Entry Time']).join(', '),'Odometer readings':g.map(x=>x['Current Odometer']).join(', '),'Litres for each refill':g.map(x=>x._litres).join(', '),'Total litres for the day':round(g.reduce((s,x)=>s+x._litres,0)),'Kilometres between refills':g.map(x=>x._km).join(', '),Status:g.some(x=>x._km<50||x._reasons.includes('Same odometer used more than once'))?'Critical':'Warning'}))}
else if(name==='lowKm'){cols=['Truck number','Driver','Previous refill date','Current refill date','Previous odometer','Current odometer','Kilometres travelled','Previous fuel quantity','Current fuel quantity','Minimum expected kilometres','Status'];rows=xs.filter(x=>x._km<50).map((x,i)=>({'Truck number':x['Truck Number'],Driver:x._driver,'Previous refill date':'See prior transaction','Current refill date':x._date,'Previous odometer':x['Previous Odometer'],'Current odometer':x['Current Odometer'],'Kilometres travelled':x._km,'Previous fuel quantity':'See prior transaction','Current fuel quantity':x._litres,'Minimum expected kilometres':50,Status:x._km<=0?'Critical':'Warning'}))}
else if(name==='odometer'){cols=['Date','Truck number','Driver','Previous odometer','Current odometer','Distance travelled','Fuel litres','Exception type','Entered by','Transaction reference'];rows=xs.filter(x=>x._reasons.some(r=>/odometer|kilometres/i.test(r))).map(x=>({'Date':x._date,'Truck number':x['Truck Number'],Driver:x._driver,'Previous odometer':x['Previous Odometer'],'Current odometer':x['Current Odometer'],'Distance travelled':x._km,'Fuel litres':x._litres,'Exception type':x._reasons.filter(r=>/odometer|kilometres/i.test(r)).join('; '),'Entered by':x['Employee Name'],'Transaction reference':x.Reference}))}
else if(name==='capacity'){cols=['Date','Truck number','Driver','Tank capacity','Fuel litres pumped','Percentage of tank capacity','Kilometres since previous refill','Status'];rows=xs.map(x=>({'Date':x._date,'Truck number':x['Truck Number'],Driver:x._driver,'Tank capacity':x._truck.tankCapacity,'Fuel litres pumped':x._litres,'Percentage of tank capacity':x._truck.tankCapacity?round(x._litres/x._truck.tankCapacity*100):0,'Kilometres since previous refill':x._km,Status:x._litres>x._truck.tankCapacity?'Critical':x._litres>x._truck.tankCapacity*.9&&x._km<50?'Warning':'Normal'}))}
else if(name==='patterns'){cols=['Truck number','Driver','Normal average refill quantity','Current refill quantity','Difference from normal','Normal refill frequency','Current refill frequency','Average historical consumption','Current consumption','Exception reason','Risk status'];rows=xs.filter(x=>x._reasons.length).map(x=>{const h=data.transactions.filter(z=>z['Truck Number']===x['Truck Number']),avg=h.reduce((s,z)=>s+z._litres,0)/(h.length||1),ac=h.reduce((s,z)=>s+z._actual,0)/(h.length||1);return{'Truck number':x['Truck Number'],Driver:x._driver,'Normal average refill quantity':round(avg),'Current refill quantity':x._litres,'Difference from normal':round(x._litres-avg),'Normal refill frequency':h.length+' historical','Current refill frequency':x._reasons.includes('Multiple refills on the same day')?'Multiple same day':'Single','Average historical consumption':round(ac),'Current consumption':x._actual,'Exception reason':x._reasons.join('; '),'Risk status':x._risk}})}
else if(name==='edited'){cols=['Transaction reference','Truck number','Driver','Original odometer','Revised odometer','Original fuel litres','Revised fuel litres','Changed by','Change date and time','Change reason','Deleted status','Deleted by','Delete reason'];rows=data.audit.filter(a=>/EDIT|DELETE|SOFT_DELETE/.test(a.Action)).map(a=>{let d={};try{d=JSON.parse(a.Details||'{}')}catch{}const o=d.original||{};return{'Transaction reference':a['Entity ID'],'Truck number':o['Truck Number']||'',Driver:o['Assigned Driver']||'','Original odometer':o['Current Odometer']||'','Revised odometer':d.revisedOdometer||'','Original fuel litres':o['Fuel Litres']||'','Revised fuel litres':d.revisedLitres||'','Changed by':a['Employee Name'],'Change date and time':fmt(a['Server Date Time']),'Change reason':d.reason||'', 'Deleted status':/DELETE/.test(a.Action)?'Soft deleted':'Edited','Deleted by':/DELETE/.test(a.Action)?a['Employee Name']:'','Delete reason':d.reason||''}})}
else if(name==='offline'){cols=['Original entry date and time','Upload date and time','Upload delay (hours)','Truck number','Driver','Odometer','Fuel litres','Entered by','Device ID','Synchronisation status','Transaction reference','Status'];rows=xs.filter(x=>String(x['Entry Mode']).toLowerCase()==='offline').map(x=>({'Original entry date and time':x['Device Date Time'],'Upload date and time':fmt(x['Upload Date Time']),'Upload delay (hours)':x._delay,'Truck number':x['Truck Number'],Driver:x._driver,Odometer:x['Current Odometer'],'Fuel litres':x._litres,'Entered by':x['Employee Name'],'Device ID':x['Device ID'],'Synchronisation status':x['Sync Status'],'Transaction reference':x.Reference,Status:x._delay>4?'Warning':'Normal'}))}

function render(){const xs=filtered(),name=report.value,r=makeReport(name,xs);viewRows=r.rows;dashboardPanel.classList.toggle('hidden',name!=='dashboard');reportTitle.textContent=report.options[report.selectedIndex].text;reportNote.textContent='Indicators are for management investigation only and are not proof of theft or misconduct.';renderTable(r.cols,r.rows);renderDashboard(xs)}
function renderTable(cols,rows){thead.innerHTML='<tr>'+cols.map(c=>`<th data-key="${esc(c)}">${esc(c)} â†•</th>`).join('')+'</tr>';tbody.innerHTML=rows.map(r=>'<tr>'+cols.map(c=>c==='Investigation'?`<td><button class="caseBtn" data-ref="${esc(r['Transaction reference'])}">Investigate</button></td>`:`<td class="${esc(r[c])}">${esc(fmt(r[c]))}</td>`).join('')+'</tr>').join('');rowCount.textContent=rows.length+' row(s)';thead.querySelectorAll('th').forEach(th=>th.onclick=()=>sortTable(th.dataset.key,cols));tbody.querySelectorAll('.caseBtn').forEach(b=>b.onclick=()=>openCase(b.dataset.ref))}
function sortTable(k,cols){sortDir=sortKey===k?-sortDir:1;sortKey=k;viewRows.sort((a,b)=>(a[k]>b[k]?1:a[k]<b[k]?-1:0)*sortDir);renderTable(cols,viewRows)}
function renderDashboard(xs){const suspicious=xs.filter(x=>x._reasons.length),today=dateKey(new Date()),month=today.slice(0,7),cardsData=[['Suspicious today',suspicious.filter(x=>x._date===today).length],['Suspicious this month',suspicious.filter(x=>x._date.startsWith(month)).length],['Critical drivers',new Set(xs.filter(x=>x.Status==='Critical').map(x=>x._driver)).size],['Critical trucks',new Set(xs.filter(x=>x.Status==='Critical').map(x=>x['Truck Number'])).size],['Multiple refills',xs.filter(x=>x._reasons.includes('Multiple refills on the same day')).length],['Low-km refills',xs.filter(x=>x._km<50).length],['Duplicate odometers',xs.filter(x=>x._reasons.includes('Same odometer used more than once')).length],['Above tank capacity',xs.filter(x=>x._reasons.includes('Fuel quantity above truck tank capacity')).length],['Edited / deleted',data.audit.filter(a=>/EDIT|DELETE/.test(a.Action)).length],['Delayed offline',xs.filter(x=>x._delay>4).length]];cards.innerHTML=cardsData.map(x=>`<div class="card"><b>${x[1]}</b><span>${x[0]}</span></div>`).join('');const chart=(title,items)=>`<div class="chart"><b>${title}</b>${items.slice(0,6).map(x=>`<div class="barrow"><span>${esc(x[0])}</span><div class="track"><div class="fill" style="width:${Math.min(100,x[1]*10)}%"></div></div><b>${round(x[1])}</b></div>`).join('')}</div>`;const driver=group(suspicious,[x=>x._driver]).map(g=>[g[0]._driver,g.length]).sort((a,b)=>b[1]-a[1]),truck=group(xs,[x=>x['Truck Number']]).map(g=>[g[0]['Truck Number'],Math.max(0,agg(g).variation)]).sort((a,b)=>b[1]-a[1]);charts.innerHTML=chart('Drivers with most exceptions',driver)+chart('Worst truck variation %',truck)+chart('Suspicious litres by month',group(suspicious,[x=>x._date.slice(0,7)]).map(g=>[g[0]._date.slice(0,7),round(g.reduce((s,x)=>s+x._litres,0))]))+chart('Multiple refills by driver',group(xs.filter(x=>x._reasons.includes('Multiple refills on the same day')),[x=>x._driver]).map(g=>[g[0]._driver,g.length]))}
function fillFilters(){const opt=(id,vals)=>$(id).innerHTML=$(id).options[0].outerHTML+[...new Set(vals.filter(Boolean))].sort().map(v=>`<option>${esc(v)}</option>`).join('');opt('truckFilter',data.trucks.map(x=>x.number));opt('driverFilter',data.transactions.map(x=>x._driver));opt('enteredFilter',data.transactions.map(x=>x['Employee Name']));opt('exceptionFilter',data.transactions.flatMap(x=>x._reasons))}
async function load(){const r=await api({action:'dashboard',token});if(!r.ok)throw Error(r.error);data={transactions:[],trucks:[],employees:[],audit:[],investigations:[],...r};enrich();fillFilters();render()}
function openCase(ref){const c=data.investigations.find(x=>String(x['Transaction Reference'])===ref)||{};caseRef.value=ref;caseStatus.value=c.Status||'New';caseInvestigator.value=c['Assigned Investigator']||'';caseComment.value=c['Investigation Comment']||'';caseExplanation.value=c['Driver Explanation']||'';caseFinding.value=c['Final Finding']||'';caseDialog.showModal()}
loginForm.onsubmit=async e=>{e.preventDefault();try{const r=await api({action:'login',userId:uid.value,pin:pin.value,deviceId:'ADMIN-DESKTOP'});if(!r.ok||!r.user.admin)throw Error(r.error||'Administrator required');token=r.token;login.classList.add('hidden');dash.classList.remove('hidden');await load()}catch(x){msg.textContent=x.message}};
caseForm.onsubmit=async e=>{e.preventDefault();const r=await api({action:'saveInvestigation',token,reference:caseRef.value,status:caseStatus.value,investigator:caseInvestigator.value,comment:caseComment.value,driverExplanation:caseExplanation.value,finding:caseFinding.value});alert(r.ok?'Investigation saved':r.error);if(r.ok){caseDialog.close();await load()}};caseClose.onclick=()=>caseDialog.close();
employeeForm.onsubmit=async e=>{e.preventDefault();const r=await api({action:'saveEmployee',token,userId:eId.value,name:eName.value,pin:ePin.value,active:true});alert(r.ok?'Employee saved':r.error)};truckForm.onsubmit=async e=>{e.preventDefault();const r=await api({action:'saveTruck',token,number:tNo.value,description:tDesc.value,driver:tDriver.value,previousOdometer:+tOdo.value,standard:+tStd.value,tankCapacity:+tTank.value,warningTolerance:+tWarn.value,criticalTolerance:+tCrit.value,active:true});alert(r.ok?'Truck saved':r.error);if(r.ok)load()};
[report,fromDate,toDate,truckFilter,driverFilter,exceptionFilter,statusFilter,enteredFilter,modeFilter].forEach(x=>x.onchange=render);refreshBtn.onclick=()=>load().catch(e=>alert(e.message));printBtn.onclick=()=>print();csvBtn.onclick=()=>{if(!viewRows.length)return;const cols=Object.keys(viewRows[0]),q=v=>'"'+String(v??'').replaceAll('"','""')+'"',csv=[cols.map(q),...viewRows.map(r=>cols.map(c=>q(r[c])))].map(x=>x.join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='yardfuel-'+report.value+'-'+dateKey(new Date())+'.csv';a.click()};
document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{const n=new Date(),d=new Date(n),iso=x=>x.toISOString().slice(0,10);toDate.value=iso(n);if(b.dataset.range==='today')fromDate.value=iso(n);if(b.dataset.range==='week'){d.setDate(n.getDate()-n.getDay()+1);fromDate.value=iso(d)}if(b.dataset.range==='month'){d.setDate(1);fromDate.value=iso(d)}if(b.dataset.range==='lastMonth'){const a=new Date(n.getFullYear(),n.getMonth()-1,1),z=new Date(n.getFullYear(),n.getMonth(),0);fromDate.value=iso(a);toDate.value=iso(z)}if(b.dataset.range==='year'){d.setMonth(0,1);fromDate.value=iso(d)}render()});clearFilters.onclick=()=>{[fromDate,toDate,truckFilter,driverFilter,exceptionFilter,statusFilter,enteredFilter,modeFilter].forEach(x=>x.value='');render()};
</script></body></html>
